<!DOCTYPE html>
<html>
    <head>
        <title>Find the Largest Number</title>
    </head>
    <body>
        <center>
            <h1><hr>Find The Largest Number<hr></h1>
            <input type="number" id="num1" placeholder="Enter the first number"><br><br>
            <input type="number" id="num2" placeholder="Enter the second number"><br><br>
            <input type="number" id="num3" placeholder="Enter the third number"><br><br>
            <button onclick="largestNumber()">Check</button>
            <h2 id="result"></h2>
        </center>

        <script>
            function largestNumber() {
                let num1 = parseFloat(document.getElementById("num1").value);
                let num2 = parseFloat(document.getElementById("num2").value);
                let num3 = parseFloat(document.getElementById("num3").value);

                if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
                    document.getElementById("result").innerHTML = "Please enter valid numbers!";
                    return;
                }

                let largest = Math.max(num1, num2, num3);
                document.getElementById("result").innerHTML = `The largest number is: ${largest}`;
            }
        </script>
    </body>
</html>
