<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Random Number Generator</h1>
        <p id="random-number">Click the button to generate a number</p>
        <button onclick="generateRandomNumber()">Generate</button>
    </div>

    <script>
        function generateRandomNumber() {
            let randomNumber = Math.floor(Math.random() * 100) + 1; // Generates a number between 1 and 100
            document.getElementById("random-number").textContent = `Random Number: ${randomNumber}`;
        }
    </script>

</body>
</html>
